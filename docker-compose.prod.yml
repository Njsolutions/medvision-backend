services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medvision-api
    environment:
      DATABASE_URL: ${DATABASE_URL}
      API_VERSION: ${API_VERSION:-1}
      PORT: ${PORT:-3333}
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      NODE_ENV: ${NODE_ENV:-production}
      DAILY_CO_API_KEY: ${DAILY_CO_API_KEY}
      DAILY_DOMAIN: ${DAILY_DOMAIN}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM:-MedVision <noreply@medvision.com>}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      SIGNATURE_SECRET_KEY: ${SIGNATURE_SECRET_KEY}
      APP_URL: ${APP_URL}
      FRONTEND_URL: ${FRONTEND_URL}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.medvision-api.rule=Host(`medvision.njsolutions.com.br`)"
      - "traefik.http.routers.medvision-api.entrypoints=websecure"
      - "traefik.http.routers.medvision-api.tls.certresolver=mytlschallenge"
      - "traefik.http.services.medvision-api.loadbalancer.server.port=3333"
      - "traefik.docker.network=root_default"
    networks:
      - root_default
    restart: unless-stopped

networks:
  root_default:
    external: true
